<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Resumetrices</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="/env-config.js"></script>
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
    }
  </style>
</head>
<body>
  <div class="auth-box-standalone" style="width: 100%; max-width: 420px; padding: 2rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); backdrop-filter: blur(12px);">
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <a href="index.html" style="display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none;">
        <img src="logo.png" alt="Resumetrices Logo" style="height: 32px; width: 32px; object-fit: contain;">
        <span style="font-size: 1.25rem; font-weight: 700; color: var(--text-main);">Resumetrices</span>
      </a>
      <h2 style="font-size: 1.5rem; margin-top: 1rem; color: var(--text-main);">Sign In</h2>
      <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem;">Optimize your CV and track match compatibility scores.</p>
    </div>

    <!-- Login Form View -->
    <div id="login-view">
      <form id="login-form">
        <div class="input-group" style="margin-bottom: 1rem;">
          <label for="auth-email" style="display: block; margin-bottom: 0.25rem; font-size: 0.85rem; color: var(--text-muted);">Email Address</label>
          <input type="email" id="auth-email" required placeholder="name@example.com" style="width: 100%;">
        </div>
        <div class="input-group" style="margin-bottom: 1rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem;">
            <label for="auth-password" style="font-size: 0.85rem; color: var(--text-muted);">Password</label>
            <a href="#" id="link-forgot-password" style="font-size: 0.75rem; color: var(--emerald); text-decoration: none; font-weight: 600;">Forgot Password?</a>
          </div>
          <input type="password" id="auth-password" required placeholder="••••••••" style="width: 100%;">
        </div>
        <div id="auth-error-msg" style="display: none; color: var(--rose, #f43f5e); font-size: 0.82rem; font-weight: 600; margin-bottom: 1rem; text-align: left; padding: 0.5rem 0.75rem; background: rgba(244, 63, 94, 0.05); border: 1px solid rgba(244, 63, 94, 0.15); border-radius: var(--radius-md, 8px);"></div>
        <button type="submit" class="btn-primary" style="width: 100%; padding: 0.75rem; font-weight: 700;">Sign In</button>
      </form>
    </div>

    <!-- Password Reset View -->
    <div id="reset-view" style="display: none;">
      <form id="forgot-password-form">
        <div class="input-group" style="margin-bottom: 1.25rem;">
          <label for="reset-email" style="display: block; margin-bottom: 0.25rem; font-size: 0.85rem; color: var(--text-muted);">Email Address</label>
          <input type="email" id="reset-email" required placeholder="name@example.com" style="width: 100%;">
        </div>
        <div id="reset-error-msg" style="display: none; color: var(--rose, #f43f5e); font-size: 0.82rem; font-weight: 600; margin-bottom: 1rem; text-align: left; padding: 0.5rem 0.75rem; background: rgba(244, 63, 94, 0.05); border: 1px solid rgba(244, 63, 94, 0.15); border-radius: var(--radius-md, 8px);"></div>
        <button type="submit" class="btn-primary" style="width: 100%; padding: 0.75rem; font-weight: 700; margin-bottom: 1rem;">Send Reset Link</button>
        <button type="button" id="btn-back-to-login" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); background: rgba(255,255,255,0.02); color: var(--text-main); font-weight: 600; border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;">Back to Sign In</button>
      </form>
    </div>

    <div class="auth-divider" style="text-align: center; margin: 1.5rem 0; position: relative;">
      <span style="background: var(--bg-secondary); padding: 0 0.75rem; color: var(--text-muted); font-size: 0.8rem; position: relative; z-index: 2;">or</span>
      <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-color); z-index: 1;"></div>
    </div>

    <button class="btn-google" id="btn-google" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem; border: 1px solid var(--border-color); background: rgba(255,255,255,0.02); color: var(--text-main); font-weight: 600; border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12.24 10.285V13.4h6.887C18.2 15.614 15.645 18 12.24 18c-3.86 0-7-3.14-7-7s3.14-7 7-7c1.7 0 3.3 0.64 4.5 1.84l2.5-2.5C17.3 1.57 14.86 1 12.24 1 6.48 1 2 5.48 2 11.24s4.48 10.24 10.24 10.24c5.76 0 10.24-4.48 10.24-10.24 0-.64-.08-1.28-.24-1.96H12.24z"/>
      </svg>
      Continue with Google
    </button>

    <p style="margin-top: 2rem; text-align: center; font-size: 0.85rem; color: var(--text-muted);">
      Don't have an account? <a href="signup.html" id="link-signup-redirect" style="color: var(--emerald); font-weight: 600; text-decoration: none;">Create one</a>
    </p>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
