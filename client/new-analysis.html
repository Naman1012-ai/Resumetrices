<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Synchronously block rendering to prevent layout flash before auth state resolves
    document.documentElement.style.visibility = 'hidden';
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Analysis - Resumetrices</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
   <!-- Reuses panels and basic styles -->
</head>
<body>

  <!-- Injected Header placeholder -->
  <div id="app-header-placeholder"></div>

  <!-- Scalable Routed Layout -->
  <div class="dashboard-layout">
    <!-- Injected Sidebar placeholder -->
    <div id="app-sidebar-placeholder"></div>

    <main class="main-page-container">
      <div id="page-new-analysis" class="page-view">
        <div style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--spacing-24);">
          <section class="panel" id="upload-panel">
            <h2 class="panel-title">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #10b981;">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
              Upload Resume
            </h2>

            <div class="upload-container">
              <div class="dropzone" id="drop-zone" tabindex="0" role="button" aria-label="Upload resume file, PDF format only, maximum 5 megabytes.">
                <div class="upload-icon">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="12" y1="18" x2="12" y2="12"></line>
                    <line x1="9" y1="15" x2="15" y2="15"></line>
                  </svg>
                </div>
                <h3>Drag & drop PDF here</h3>
                <p>or click to browse</p>
                <p style="font-size: 0.7rem; margin-top: 0.25rem; color: var(--text-muted);">Max file size: 5MB</p>
                <input type="file" id="file-input" accept=".pdf">
              </div>

              <!-- Selected File Card -->
              <div class="file-preview-card" id="file-preview" style="display: none; margin-bottom: 1.5rem; width: 100%;">
                <div class="file-preview-icon">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                  </svg>
                </div>
                <div class="file-details">
                  <div class="file-name" id="preview-file-name">filename.pdf</div>
                  <div class="file-size" id="preview-file-size">120 KB</div>
                </div>
                <button class="btn-remove-file" id="btn-remove-file" aria-label="Remove selected file">×</button>
              </div>

              <!-- Target Job Role Dropdown -->
              <div class="select-wrapper" style="margin-bottom: 1.5rem; width: 100%;">
                <label for="target-role-select">Target Job Role <span style="color: #ef4444;">*</span></label>
                <select id="target-role-select" style="width: 100%;">
                  <option value="" disabled selected>-- Select Target Job Role --</option>
                  <option value="Software Engineer">Software Engineer</option>
                  <option value="Frontend Developer">Frontend Developer</option>
                  <option value="Backend Developer">Backend Developer</option>
                  <option value="Full Stack Developer">Full Stack Developer</option>
                  <option value="AI/ML Engineer">AI/ML Engineer</option>
                  <option value="Data Scientist">Data Scientist</option>
                  <option value="Data Analyst">Data Analyst</option>
                  <option value="DevOps Engineer">DevOps Engineer</option>
                  <option value="Cloud Engineer">Cloud Engineer</option>
                  <option value="Mobile Developer">Mobile Developer</option>
                  <option value="Cybersecurity Analyst">Cybersecurity Analyst</option>
                  <option value="QA Engineer">QA Engineer</option>
                  <option value="Product Manager">Product Manager</option>
                  <option value="UI/UX Designer">UI/UX Designer</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <button class="btn-analyze" id="btn-analyze" disabled style="width: 100%;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                  <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                  <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                Run Pipeline Analysis
              </button>
            </div>
          </section>

          <!-- Recent Analyses (Last 3) Panel -->
          <div class="panel" id="recent-analyses-mini-panel" style="display: none;">
            <h4 style="margin: 0 0 1rem 0; font-size: 0.95rem; font-weight: 700; color: var(--text-main);">Recent Uploads</h4>
            <div id="recent-analyses-mini-list" style="display: flex; flex-direction: column; gap: var(--spacing-12);">
              <!-- Dynamically populated 3 items -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth-guard.js"></script>
  <script type="module" src="js/navigation.js"></script>
  <script type="module" src="js/new-analysis.js"></script>
</body>
</html>
